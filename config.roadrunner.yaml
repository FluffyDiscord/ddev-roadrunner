#ddev-generated
# RoadRunner runs as a FastCGI backend on :9000; DDEV's nginx fronts it.
# nginx is repointed at RoadRunner via a static .ddev/nginx_full/nginx-site.conf override
# that the add-on generates at install time (see install.yaml post_install_actions). DDEV
# respects that file (no #ddev-generated marker) and never regenerates it, so the routing
# is stable across restarts — no runtime patching of the nginx config.
# php-fpm stays up but idle — DDEV's healthcheck (/phpstatus) and the /xhprof UI keep using it.
webserver_type: nginx-fpm
web_extra_daemons:
  - name: "roadrunner"
    # rr reads the project's OWN .rr.yaml (bind-mounted live); it must use http.fcgi (see example.rr.yaml).
    # RR_CONFIG_FILE (default .rr.yaml) selects which config file rr loads. Adjust it with:
    #   ddev dotenv set .ddev/.env.web --rr-config-file=.rr.dev.yaml && ddev restart
    # bash -c expands the env var (.ddev/.env.web is injected into the web container); exec keeps
    # rr in the foreground so supervisord manages it.
    command: "bash -c 'exec /usr/local/bin/rr serve -w /var/www/html -c ${RR_CONFIG_FILE:-.rr.yaml}'"
    directory: /var/www/html
