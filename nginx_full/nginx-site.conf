# ddev-roadrunner-managed
# Installed by the `ddev-roadrunner` add-on. It is a copy of DDEV's default nginx site
# config with ONE change: the application's PHP requests go to RoadRunner's FastCGI
# listener (127.0.0.1:9000) instead of the php-fpm socket. /phpstatus (healthcheck) and
# /xhprof keep using php-fpm via the includes at the bottom of the server block.
#
# This file intentionally omits DDEV's generated-file marker comment, so DDEV treats it as
# a user override and never regenerates it — that is what keeps RoadRunner routing stable
# across `ddev start` (no runtime patching). `ddev add-on remove roadrunner` deletes it.
# (Do not add that marker back, or DDEV will overwrite this file with the php-fpm default.)
#
# The `root` below defaults to `public` (Symfony default) but is set to the project's
# actual docroot (`ddev config --docroot`) by the add-on at install time. To change it
# afterwards, edit the `root` line here and `ddev restart`. Compatible with the `symfony`
# and `php` project types. https://symfony.com/doc/current/setup/web_server_configuration.html#nginx

server {
    listen 80 default_server;
    listen 443 ssl default_server;

    root /var/www/html/public;

    ssl_certificate /etc/ssl/certs/master.crt;
    ssl_certificate_key /etc/ssl/certs/master.key;

    include /etc/nginx/monitoring.conf;

    index index.php index.htm index.html;

    # Disable sendfile as per https://docs.vagrantup.com/v2/synced-folders/virtualbox.html
    sendfile off;
    error_log /dev/stdout info;
    access_log /var/log/nginx/access.log;

    location / {
        absolute_redirect off;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location @rewrite {
        rewrite ^ /index.php;
    }

    # Pass PHP to RoadRunner's FastCGI listener (the add-on's one change vs. DDEV's default).
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME $fastcgi_script_name;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_intercept_errors off;
        # fastcgi_read_timeout should match max_execution_time in php.ini
        fastcgi_read_timeout 10m;
        fastcgi_param SERVER_NAME $host;
        fastcgi_param HTTPS $fcgi_https;
        # Pass the X-Accel-* headers to facilitate testing.
        fastcgi_pass_header "X-Accel-Buffering";
        fastcgi_pass_header "X-Accel-Charset";
        fastcgi_pass_header "X-Accel-Expires";
        fastcgi_pass_header "X-Accel-Limit-Rate";
        fastcgi_pass_header "X-Accel-Redirect";
    }

    # Prevent clients from accessing hidden files (starting with a dot)
    # Access to `/.well-known/` is allowed.
    location ~* /\.(?!well-known\/) {
        deny all;
    }

    # Prevent clients from accessing to backup/config/source files
    location ~* (?:\.(?:bak|conf|dist|fla|in[ci]|log|psd|sh|sql|sw[op])|~)$ {
        deny all;
    }

    include /etc/nginx/common.d/*.conf;
    include /mnt/ddev_config/nginx/*.conf;
}
